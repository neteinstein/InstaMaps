name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Fail fast before spending CI time on lint/test/build if the release secrets aren't set up.
      - name: Validate required secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
        run: |
          missing=()
          [ -z "$KEYSTORE_BASE64" ] && missing+=("KEYSTORE_BASE64")
          [ -z "$KEYSTORE_PASSWORD" ] && missing+=("KEYSTORE_PASSWORD")
          [ -z "$KEY_ALIAS" ] && missing+=("KEY_ALIAS")
          [ -z "$KEY_PASSWORD" ] && missing+=("KEY_PASSWORD")
          [ -z "$PLACES_API_KEY" ] && missing+=("PLACES_API_KEY")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required Action secrets: ${missing[*]}"
            exit 1
          fi

      # PR Checks validates the PR branch/merge ref, but squash- or rebase-merges land a commit on
      # main that was never itself built or tested, so this is the only gate that actually covers
      # the exact commit about to be released.
      - name: Run ktlint
        run: ./gradlew ktlintCheck --console=plain

      - name: Run unit tests
        run: ./gradlew test --console=plain

      # Real Places API key for the release build, so geocoding works at runtime - without this,
      # the secrets-gradle-plugin would silently fall back to the local.defaults.properties
      # placeholder (fine for local dev, not for a shipped release). See app/build.gradle.kts.
      - name: Configure Places API key
        env:
          PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
        run: echo "PLACES_API_KEY=$PLACES_API_KEY" > secrets.properties

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          APP_VERSION_CODE: ${{ github.run_number }}
          APP_VERSION_NAME: "1.0.${{ github.run_number }}"
        run: ./gradlew assembleRelease --console=plain

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
        run: |
          gh release create "v${VERSION_NAME}" \
            app/build/outputs/apk/release/app-release.apk \
            --title "v${VERSION_NAME}" \
            --generate-notes
